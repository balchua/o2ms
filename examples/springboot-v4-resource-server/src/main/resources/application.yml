spring:
  security:
    oauth2:
      client:
        provider:
          mock:
            issuer-uri: ${MOCK_ISSUER_URI:http://127.0.0.1:8090}
        registration:
          mock:
            provider: mock
            client-id: ${MOCK_CLIENT_ID:springboot-web-client}
            client-secret: ${MOCK_CLIENT_SECRET:springboot-secret}
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
      resourceserver:
        jwt:
          issuer-uri: ${MOCK_ISSUER_URI:http://127.0.0.1:8090}

server:
  port: 8081
