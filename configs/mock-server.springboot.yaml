server:
  bind_host: 127.0.0.1
  bind_port: 8090
  log_level: info
  startup_mode: foreground
  health_endpoint_enabled: true
  runtime_client_registration_enabled: true

issuer:
  base_url: http://127.0.0.1:8090

oauth:
  require_state: true
  pkce_required: false
  access_token_ttl_seconds: 3600
  refresh_token_ttl_seconds: 2592000
  authorization_code_ttl_seconds: 600
  cleanup_interval_seconds: 300
  supported_grant_types:
    - client_credentials
  supported_response_types:
    - code
  supported_scopes:
    - openid
    - profile
    - email
  supported_claims:
    - sub
    - name
    - email
  token_endpoint_auth_methods:
    - none
  code_challenge_methods:
    - plain
    - S256
  signing_algorithm: RS256
  signing_key_strategy: ephemeral_rsa

token_response:
  emit_json_body: true
  emit_headers:
    - header_name: Authorization
      token_field: access_token
      value_format: bearer

clients:
  - client_id: springboot-resource-server
    client_name: Spring Boot Resource Server
    enabled: true
    client_secret: null
    token_endpoint_auth_method: none
    redirect_uris: []
    grant_types:
      - client_credentials
    response_types:
      - code
    allowed_scopes:
      - openid
      - profile
      - email
    default_scopes:
      - openid
    linked_users:
      - demo-user
    claims_template_refs:
      - spring-default
    custom_claims: {}

users:
  - user_id: demo-user
    sub: demo-user
    username: demo-user
    email: demo@example.com
    display_name: Demo User
    enabled: true
    default_scopes:
      - openid
      - profile
    roles:
      - USER
    groups: []
    claims_template_refs:
      - spring-default
    custom_claims: {}

claims_templates:
  spring-default:
    name: Demo User
    authorizations: []

admin:
  reset_endpoint_enabled: false
  list_clients_endpoint_enabled: false
  config_endpoint_enabled: false
